<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherScope — Detailed Weather Made Simple</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg-1: #0a1d33;
        --bg-2: #112d4e;
        --card: rgba(255, 255, 255, 0.13);
        --card-strong: rgba(255, 255, 255, 0.2);
        --text-main: #f6f8ff;
        --text-soft: #d4dbf2;
        --accent: #89c4ff;
        --good: #6cf29c;
        --bad: #ff9aa5;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text-main);
        background: radial-gradient(circle at top right, #295ea1 0%, transparent 40%),
          radial-gradient(circle at top left, #33739a 0%, transparent 35%),
          linear-gradient(155deg, var(--bg-1) 0%, var(--bg-2) 100%);
        min-height: 100vh;
      }

      .shell {
        width: min(1200px, 94vw);
        margin: 2.2rem auto;
        display: grid;
        gap: 1rem;
      }

      .glass {
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 1.2rem;
        box-shadow: var(--shadow);
      }

      .header {
        padding: 1rem 1.2rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        align-items: center;
        justify-content: space-between;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.35rem, 2vw, 1.9rem);
      }

      .brand p {
        margin: 0.2rem 0 0;
        color: var(--text-soft);
        font-size: 0.95rem;
      }

      .header-actions {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
      }

      input,
      button {
        border: none;
        border-radius: 999px;
        padding: 0.62rem 1rem;
        font-size: 0.95rem;
      }

      input {
        min-width: 240px;
        background: rgba(255, 255, 255, 0.92);
        color: #10213a;
      }

      button {
        background: linear-gradient(110deg, #8cd4ff, #7cb7ff);
        color: #10213a;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.04);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1rem;
      }

      .panel {
        padding: 1rem;
      }

      .current {
        grid-column: span 4;
      }

      .details {
        grid-column: span 8;
      }

      .forecast-7 {
        grid-column: span 12;
      }

      .hourly {
        grid-column: span 12;
      }

      .radar {
        grid-column: span 12;
      }

      .muted {
        color: var(--text-soft);
      }

      .current-temp {
        font-size: clamp(2.1rem, 4vw, 3.7rem);
        margin: 0.4rem 0 0;
        font-weight: 700;
      }

      .big-label {
        margin: 0.2rem 0;
        font-size: 1.07rem;
      }

      .chip-grid {
        margin-top: 0.75rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 0.55rem;
      }

      .chip {
        padding: 0.65rem;
        border-radius: 0.8rem;
        background: rgba(255, 255, 255, 0.15);
      }

      .chip .k {
        font-size: 0.78rem;
        color: var(--text-soft);
      }

      .chip .v {
        margin-top: 0.2rem;
        font-size: 1rem;
        font-weight: 600;
      }

      .headline {
        padding: 0.75rem;
        border-radius: 0.8rem;
        background: rgba(255, 255, 255, 0.14);
      }

      .headline.bad {
        border-left: 4px solid var(--bad);
      }

      .headline.good {
        border-left: 4px solid var(--good);
      }

      .daily-grid {
        margin-top: 0.6rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
        gap: 0.65rem;
      }

      .daily-card,
      .hourly-card {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 0.9rem;
        padding: 0.7rem;
      }

      .hourly-scroll {
        margin-top: 0.6rem;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(110px, 1fr);
        overflow-x: auto;
        gap: 0.7rem;
        padding-bottom: 0.45rem;
      }

      .hourly-scroll::-webkit-scrollbar {
        height: 9px;
      }

      .hourly-scroll::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
      }

      #radarMap {
        height: 420px;
        border-radius: 0.9rem;
        overflow: hidden;
      }

      .radar-meta {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-soft);
      }

      .status {
        min-height: 1.2rem;
        font-size: 0.92rem;
      }

      @media (max-width: 940px) {
        .current,
        .details {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="glass header">
        <div class="brand">
          <h1>WeatherScope</h1>
          <p>Simple language, rich weather detail powered by NOAA/NWS + RainViewer</p>
        </div>
        <div class="header-actions">
          <input id="locationInput" type="text" placeholder="Enter a US city, state (e.g., Seattle, WA)" />
          <button id="searchBtn">Search</button>
          <button id="geoBtn" title="Use current location">Use My Location</button>
        </div>
      </section>

      <div id="status" class="status muted"></div>

      <section class="grid">
        <article class="panel glass current">
          <div class="muted" id="locationLabel">Waiting for location...</div>
          <h2 class="current-temp" id="currentTemp">--°</h2>
          <p class="big-label" id="currentDesc">No data yet</p>
          <p class="muted" id="feelsLike">Feels like --</p>
          <div class="chip-grid" id="currentChips"></div>
        </article>

        <article class="panel glass details">
          <h3 style="margin-top:0">What to expect</h3>
          <div id="headlineWrap"></div>
        </article>

        <article class="panel glass forecast-7">
          <h3 style="margin-top:0">7 Day Forecast</h3>
          <div class="daily-grid" id="dailyGrid"></div>
        </article>

        <article class="panel glass hourly">
          <h3 style="margin-top:0">Hourly Forecast (next 24 hours)</h3>
          <div class="hourly-scroll" id="hourlyGrid"></div>
        </article>

        <article class="panel glass radar">
          <h3 style="margin-top:0">Live Radar (RainViewer)</h3>
          <div id="radarMap"></div>
          <div class="radar-meta" id="radarMeta"></div>
        </article>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const statusEl = document.getElementById("status");
      const locationLabel = document.getElementById("locationLabel");
      const currentTemp = document.getElementById("currentTemp");
      const currentDesc = document.getElementById("currentDesc");
      const feelsLike = document.getElementById("feelsLike");
      const currentChips = document.getElementById("currentChips");
      const headlineWrap = document.getElementById("headlineWrap");
      const dailyGrid = document.getElementById("dailyGrid");
      const hourlyGrid = document.getElementById("hourlyGrid");
      const radarMeta = document.getElementById("radarMeta");

      const locationInput = document.getElementById("locationInput");
      const searchBtn = document.getElementById("searchBtn");
      const geoBtn = document.getElementById("geoBtn");

      const USER_AGENT = "WeatherScopeDemo/1.0 (example@example.com)";

      let radarMap;
      let radarLayer;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#ffd2d9" : "var(--text-soft)";
      }

      function toF(celsius) {
        if (typeof celsius !== "number") return null;
        return (celsius * 9) / 5 + 32;
      }

      function formatTemp(valueF) {
        if (valueF == null || Number.isNaN(valueF)) return "--";
        return `${Math.round(valueF)}°F`;
      }

      function formatDate(value) {
        return new Date(value).toLocaleDateString(undefined, {
          weekday: "short",
          month: "short",
          day: "numeric",
        });
      }

      function formatHour(value) {
        return new Date(value).toLocaleTimeString(undefined, {
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function parseNWSValue(metric) {
        return metric?.value ?? null;
      }

      async function geocodeLocation(query) {
        const url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("q", query);
        url.searchParams.set("format", "json");
        url.searchParams.set("limit", "1");
        url.searchParams.set("countrycodes", "us");

        const response = await fetch(url, {
          headers: {
            "Accept": "application/json",
            "User-Agent": USER_AGENT,
          },
        });

        if (!response.ok) throw new Error("Could not find that location.");
        const data = await response.json();
        if (!data.length) throw new Error("No matching US location found.");

        return {
          lat: Number(data[0].lat),
          lon: Number(data[0].lon),
          name: data[0].display_name,
        };
      }

      async function fetchNWS(url) {
        const response = await fetch(url, {
          headers: {
            "Accept": "application/geo+json",
            "User-Agent": USER_AGENT,
          },
        });
        if (!response.ok) {
          throw new Error(`NWS request failed (${response.status})`);
        }
        return response.json();
      }

      function renderCurrent(currentObs, zone, pointData) {
        const props = currentObs?.properties || {};
        const tempF = toF(parseNWSValue(props.temperature));
        const dewF = toF(parseNWSValue(props.dewpoint));
        const windSpeed = parseNWSValue(props.windSpeed);
        const vis = parseNWSValue(props.visibility);
        const humidity = parseNWSValue(props.relativeHumidity);

        currentTemp.textContent = formatTemp(tempF);
        currentDesc.textContent = props.textDescription || "Current conditions unavailable";
        feelsLike.textContent = `Dew point ${formatTemp(dewF)} • Humidity ${humidity ? `${Math.round(humidity)}%` : "--"}`;

        const chips = [
          ["Wind", windSpeed != null ? `${Math.round(windSpeed * 2.23694)} mph` : "--"],
          ["Visibility", vis != null ? `${(vis / 1609.34).toFixed(1)} mi` : "--"],
          ["Station", props.station?.split("/").pop() || "--"],
          ["Grid", `${pointData.properties.gridId} ${pointData.properties.gridX},${pointData.properties.gridY}`],
        ];

        currentChips.innerHTML = chips
          .map(
            ([k, v]) => `<div class="chip"><div class="k">${k}</div><div class="v">${v}</div></div>`
          )
          .join("");
      }

      function renderAlerts(alerts) {
        const features = alerts?.features || [];
        if (!features.length) {
          headlineWrap.innerHTML = `<div class="headline good"><strong>No active weather alerts</strong><p class="muted" style="margin:.4rem 0 0">Great news—there are no active watches or warnings for this location right now.</p></div>`;
          return;
        }

        headlineWrap.innerHTML = features
          .slice(0, 3)
          .map((item) => {
            const p = item.properties;
            return `<div class="headline bad" style="margin-bottom:.6rem"><strong>${p.event}</strong><p style="margin:.35rem 0" class="muted">${p.headline || "Alert in effect"}</p><p style="margin:0">${(p.description || "").slice(0, 220)}...</p></div>`;
          })
          .join("");
      }

      function renderDaily(periods) {
        const days = periods.filter((p) => p.isDaytime).slice(0, 7);
        dailyGrid.innerHTML = days
          .map(
            (d) => `<article class="daily-card">
              <div class="muted">${d.name}</div>
              <div style="font-size:1.3rem;font-weight:700;margin:.2rem 0">${d.temperature}°${d.temperatureUnit}</div>
              <div>${d.shortForecast}</div>
              <div class="muted" style="margin-top:.35rem">Rain chance: ${d.probabilityOfPrecipitation?.value ?? 0}%</div>
            </article>`
          )
          .join("");
      }

      function renderHourly(periods) {
        hourlyGrid.innerHTML = periods
          .slice(0, 24)
          .map(
            (h) => `<article class="hourly-card">
              <div class="muted">${formatHour(h.startTime)}</div>
              <div style="font-size:1.1rem;font-weight:700;margin:.2rem 0">${h.temperature}°${h.temperatureUnit}</div>
              <div>${h.shortForecast}</div>
              <div class="muted" style="margin-top:.35rem">${h.windSpeed} ${h.windDirection}</div>
            </article>`
          )
          .join("");
      }

      async function renderRadar(lat, lon) {
        if (!radarMap) {
          radarMap = L.map("radarMap", { zoomControl: true }).setView([lat, lon], 7);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "© OpenStreetMap contributors",
          }).addTo(radarMap);
        } else {
          radarMap.setView([lat, lon], 7);
        }

        const response = await fetch("https://api.rainviewer.com/public/weather-maps.json");
        const data = await response.json();

        const latestFrame = data.radar?.past?.at(-1) || data.radar?.nowcast?.[0];
        if (!latestFrame) {
          radarMeta.textContent = "No radar frame available right now.";
          return;
        }

        const tileUrl = `https://tilecache.rainviewer.com${latestFrame.path}/256/{z}/{x}/{y}/2/1_1.png`;

        if (radarLayer) {
          radarMap.removeLayer(radarLayer);
        }

        radarLayer = L.tileLayer(tileUrl, {
          opacity: 0.6,
          attribution: "RainViewer",
          zIndex: 500,
        }).addTo(radarMap);

        radarMeta.textContent = `Radar frame time: ${formatDate(latestFrame.time * 1000)} ${new Date(
          latestFrame.time * 1000
        ).toLocaleTimeString()}`;
      }

      async function loadWeather({ lat, lon, name }) {
        try {
          setStatus("Loading weather details...");
          locationLabel.textContent = name
            ? name
            : `Lat ${lat.toFixed(3)}, Lon ${lon.toFixed(3)}`;

          const pointData = await fetchNWS(`https://api.weather.gov/points/${lat},${lon}`);
          const { forecast, forecastHourly, observationStations, forecastZone } = pointData.properties;

          const [forecastData, hourlyData, stationsData, alertsData] = await Promise.all([
            fetchNWS(forecast),
            fetchNWS(forecastHourly),
            fetchNWS(observationStations),
            fetchNWS(
              `https://api.weather.gov/alerts/active?zone=${forecastZone.split("/").pop()}`
            ),
          ]);

          const stationUrl = stationsData.observationStations?.[0];
          const currentObs = stationUrl
            ? await fetchNWS(`${stationUrl}/observations/latest`)
            : { properties: {} };

          renderCurrent(currentObs, forecastZone, pointData);
          renderAlerts(alertsData);
          renderDaily(forecastData.properties.periods || []);
          renderHourly(hourlyData.properties.periods || []);
          await renderRadar(lat, lon);

          setStatus("Weather loaded successfully.");
        } catch (error) {
          console.error(error);
          setStatus(error.message || "Failed to load weather data.", true);
        }
      }

      searchBtn.addEventListener("click", async () => {
        const query = locationInput.value.trim();
        if (!query) {
          setStatus("Enter a location like 'Denver, CO'.", true);
          return;
        }

        try {
          setStatus("Finding your location...");
          const geo = await geocodeLocation(query);
          await loadWeather(geo);
        } catch (error) {
          setStatus(error.message || "Location lookup failed.", true);
        }
      });

      geoBtn.addEventListener("click", () => {
        if (!navigator.geolocation) {
          setStatus("Geolocation is not supported on this browser.", true);
          return;
        }

        setStatus("Getting your location from device...");
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            loadWeather({
              lat: pos.coords.latitude,
              lon: pos.coords.longitude,
              name: "Your current location",
            });
          },
          () => setStatus("Could not access your current location.", true),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });

      loadWeather({ lat: 38.9072, lon: -77.0369, name: "Washington, DC" });
    </script>
  </body>
</html>
